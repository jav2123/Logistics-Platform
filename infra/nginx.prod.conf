user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    sendfile        on;
    keepalive_timeout  65;

    # COMPLETAMENTE ALINEADO CON TUS DOCKERFILES INTERNOS:
    upstream auth_service {
        server auth-service:8080; # .NET 9 interno por defecto
    }

    upstream shipment_service {
        server shipment-service:9000; # Play Framework (Scala) interno por defecto
    }

    upstream analytics_service {
        server analytics-service:8081; # Spring Boot (Java) configurado en EXPOSE 8081
    }

    server {
        listen 80;
        server_name localhost;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location /api/v1/auth/ {
            proxy_pass http://auth_service/;
        }

        location /api/v1/shipments/ {
            proxy_pass http://shipment_service/;
        }

        location /api/v1/analytics/ {
            proxy_pass http://analytics_service/;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}