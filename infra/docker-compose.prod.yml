version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: logistics-postgres-prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432" 
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - logistics-network

  redis-cache:
    image: redis:7-alpine
    container_name: logistics-redis-prod
    networks:
      - logistics-network

  rabbitmq-broker:
    image: rabbitmq:3-management-alpine
    container_name: logistics-rabbitmq-prod
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      - logistics-network

  auth-service:
    build:
      context: ./../auth-service/src
      dockerfile: Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres-db;Database=auth_db;Username=${DB_USER};Password=${DB_PASSWORD}
      - Redis__Host=redis-cache
    depends_on:
      - postgres-db
      - redis-cache
    networks:
      - logistics-network

  shipment-service:
    build:
      context: ./../shipment-service/src/shipment-service
      dockerfile: Dockerfile
    environment:
      - DB_URL=jdbc:postgresql://postgres-db:5432/shipment_db
      - RABBITMQ_HOST=rabbitmq-broker
    depends_on:
      - postgres-db
      - rabbitmq-broker
    networks:
      - logistics-network

  analytics-service:
    build:
      context: ./../analytics-service
    environment: 
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/analytics_db
      - SPRING_RABBITMQ_HOST=rabbitmq-broker
      - SERVER_PORT=8081
    depends_on:
      - postgres-db
      - rabbitmq-broker
    networks:
      - logistics-network

  api-gateway:
    image: nginx:alpine
    container_name: logistics-nginx-prod
    ports:
      - "80:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro 
    depends_on:
      - auth-service
      - shipment-service
      - analytics-service
    networks:
      - logistics-network

volumes:
  postgres_prod_data: 

networks:
  logistics-network:
    driver: bridge